  <h1>Denominator</h1>

  <div class="card">
    <p class="label">Definition</p>
    <p>In a fraction \(\frac{p(x)}{q(x)}\), the denominator is the bottom expression \(q(x)\).</p>
  </div>

  <div class="card">
    <p class="label">Simple Example</p>
    <p>In \(\frac{x^2}{(4-x^2)^{3/2}}\), the denominator is \((4-x^2)^{3/2}\).</p>
    <p>In \(\frac{3}{x+1}\), the denominator is \(x+1\).</p>
  </div>
