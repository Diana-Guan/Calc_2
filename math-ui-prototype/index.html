  <h1>Question 34</h1>
  <p>Evaluate \( \int \frac{x^2}{(4-x^2)^{3/2}}\,dx \).</p>

  <div class="card">
    <strong>What this question is asking:</strong>
    Use
    <a class="link-term" href="./definitions/trig-substitution.html">trigonometric substitution</a>
    and rewrite the
    <a class="link-term" href="./definitions/denominator.html">denominator</a>.
  </div>

  <h2>Step 1</h2>
  <p>\((4-x^2)^{3/2} = ((4-x^2)^{1/2})^3 = (\sqrt{4-x^2})^3\)</p>
